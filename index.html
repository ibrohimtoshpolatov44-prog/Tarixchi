<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarixchi - Erkin Dizayn</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .post-card { background: white; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .post-card img { width: 100%; height: auto; display: block; }
        .inner-html-content { padding: 20px; } /* Bu yerda bizning HTML dizaynimiz joylashadi */
        
        /* Admin Panel */
        .admin-box { background: #fff; padding: 20px; border-radius: 10px; border: 2px solid #3498db; margin-top: 40px; }
        textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>Tarixchi Master Ilova</h1></header>

<div class="container" id="display-area">
    <p style="text-align: center;">Ma'lumotlar yuklanmoqda...</p>
</div>

<div class="container admin-box">
    <h3>🛠 Yangi Dizaynli Post</h3>
    <input type="text" id="p-title" placeholder="Post sarlavhasi (ichki qidiruv uchun)">
    <textarea id="p-html" rows="8" placeholder="Men (AI) bergan HTML kodni shu yerga joylang..."></textarea>
    <input type="file" id="p-file" accept="image/*">
    <button onclick="publishPost()">Dunyoga ko'rsatish 🚀</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyALt04YmpCH0_rOqVPCL952gKRa8jQj_hY",
      authDomain: "tarixchi-8ae25.firebaseapp.com",
      databaseURL: "https://tarixchi-8ae25-default-rtdb.firebaseio.com",
      projectId: "tarixchi-8ae25",
      storageBucket: "tarixchi-8ae25.firebasestorage.app",
      messagingSenderId: "243206919519",
      appId: "1:243206919519:web:bac7c64a07ccb089cb92ea"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let selectedImg = "";

    document.getElementById('p-file').addEventListener('change', (e) => {
        const r = new FileReader();
        r.onload = () => { selectedImg = r.result; };
        r.readAsDataURL(e.target.files[0]);
    });

    function publishPost() {
        const title = document.getElementById('p-title').value;
        const htmlCode = document.getElementById('p-html').value;
        
        if(!htmlCode) return alert("Kod qani?");

        db.ref('master_posts').push({
            title: title,
            content: htmlCode, // Bu yerda butun boshli HTML saqlanadi
            image: selectedImg,
            date: new Date().toLocaleString()
        }).then(() => { alert("Post chop etildi!"); location.reload(); });
    }

    db.ref('master_posts').on('value', (snap) => {
        const area = document.getElementById('display-area');
        area.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.values(data).reverse().forEach(post => {
                area.innerHTML += `
                    <div class="post-card">
                        ${post.image ? `<img src="${post.image}">` : ''}
                        <div class="inner-html-content">
                            ${post.content} 
                        </div>
                    </div>
                `;
            });
        } else { area.innerHTML = "Hozircha dizaynlar yo'q."; }
    });
</script>

</body>
</html>
