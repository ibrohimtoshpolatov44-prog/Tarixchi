<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarixchi - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --sidebar-bg: #2c3e50; --text-light: #ecf0f1; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }

        /* Sidebar Dizayni */
        .sidebar { width: 250px; background: var(--sidebar-bg); height: 100vh; position: fixed; color: var(--text-light); transition: 0.3s; z-index: 1000; left: -250px; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; font-weight: bold; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .menu-list { list-style: none; padding: 0; margin: 0; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item span { margin-right: 15px; font-size: 18px; }

        /* Asosiy Kontent */
        .main-content { flex: 1; margin-left: 0; transition: 0.3s; min-height: 100vh; }
        header { background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; position: sticky; top: 0; z-index: 999; }
        .menu-toggle { font-size: 24px; cursor: pointer; margin-right: 20px; background: none; border: none; }
        
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .page { display: none; }
        .page.active-page { display: block; }

        /* Postlar */
        .post-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; position: relative; }
        .post-card img { width: 100%; max-height: 350px; object-fit: cover; }
        .post-body { padding: 20px; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; display: none; font-size: 12px; }

        /* Admin Form */
        .admin-form { background: white; padding: 25px; border-radius: 15px; border-top: 4px solid var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">TARIXCHI <span onclick="toggleMenu()" style="cursor:pointer">&times;</span></div>
        <ul class="menu-list">
            <li class="menu-item" onclick="showPage('tarix-nima', '🏛 Tarix nima?')"><span>🏛</span> Tarix nima?</li>
            <li class="menu-item" onclick="showPage('davrlar', '⏳ Davrlar')"><span>⏳</span> Davrlar</li>
            <li class="menu-item" onclick="showPage('darsliklar', '📚 Darsliklar')"><span>📚</span> Darsliklar</li>
            <li class="menu-item" onclick="showPage('qollanmalar', '📝 Qo\'llanmalar')"><span>📝</span> Qo'llanmalar</li>
            <li class="menu-item" onclick="showPage('kanallar', '📢 Kanallarimiz')"><span>📢</span> Kanallarimiz</li>
            <li class="menu-item" onclick="showPage('saytlar', '🌐 Saytlarimiz')"><span>🌐</span> Saytlarimiz</li>
            <li class="menu-item" onclick="showPage('videolar', '🎬 Videolar')"><span>🎬</span> Videolar</li>
            <li class="menu-item" onclick="checkAdmin()"><span>🔐</span> Admin</li>
        </ul>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <header>
            <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
            <h2 id="current-title" style="margin:0; font-size: 18px;">🏛 Tarix nima?</h2>
        </header>

        <div class="container">
            <div id="tarix-nima" class="page active-page"></div>
            <div id="davrlar" class="page"></div>
            <div id="darsliklar" class="page"></div>
            <div id="qollanmalar" class="page"></div>
            <div id="kanallar" class="page"></div>
            <div id="saytlar" class="page"></div>
            <div id="videolar" class="page"></div>

            <div id="admin-panel" class="page">
                <div class="admin-form">
                    <h3>🛠 Yangi post yuklash</h3>
                    <select id="p-cat">
                        <option value="tarix-nima">Tarix nima?</option>
                        <option value="davrlar">Davrlar</option>
                        <option value="darsliklar">Darsliklar</option>
                        <option value="qollanmalar">Qo'llanmalar</option>
                        <option value="kanallar">Kanallarimiz</option>
                        <option value="saytlar">Saytlarimiz</option>
                        <option value="videolar">Videolar</option>
                    </select>
                    <textarea id="p-html" rows="8" placeholder="HTML dizayn kodini shu yerga tashlang..."></textarea>
                    <input type="file" id="p-file" accept="image/*">
                    <button class="save-btn" onclick="upload()">Chop etish 🚀</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyALt04YmpCH0_rOqVPCL952gKRa8jQj_hY",
      authDomain: "tarixchi-8ae25.firebaseapp.com",
      databaseURL: "https://tarixchi-8ae25-default-rtdb.firebaseio.com",
      projectId: "tarixchi-8ae25",
      storageBucket: "tarixchi-8ae25.firebasestorage.app",
      messagingSenderId: "243206919519",
      appId: "1:243206919519:web:bac7c64a07ccb089cb92ea"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;
    let base64 = "";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showPage(id, title) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.getElementById('current-title').innerText = title;
        toggleMenu();
        window.scrollTo(0,0);
    }

    function checkAdmin() {
        const p = prompt("Admin parolini kiriting:");
        if(p === "777") {
            isAdmin = true;
            showPage('admin-panel', '🔐 Admin Panel');
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        } else { alert("Xato!"); }
    }

    document.getElementById('p-file').addEventListener('change', (e) => {
        const fr = new FileReader();
        fr.onload = () => { base64 = fr.result; };
        fr.readAsDataURL(e.target.files[0]);
    });

    function upload() {
        const cat = document.getElementById('p-cat').value;
        const html = document.getElementById('p-html').value;
        if(!html) return alert("Kod kiriting!");
        
        db.ref('pro_posts/' + cat).push({
            content: html,
            img: base64,
            time: new Date().toLocaleString()
        }).then(() => { alert("Post yuklandi!"); location.reload(); });
    }

    function remove(cat, id) {
        if(confirm("O'chirilsinmi?")) db.ref(`pro_posts/${cat}/${id}`).remove();
    }

    const categories = ['tarix-nima','davrlar','darsliklar','qollanmalar','kanallar','saytlar','videolar'];
    categories.forEach(cat => {
        db.ref('pro_posts/' + cat).on('value', (s) => {
            const area = document.getElementById(cat);
            area.innerHTML = "";
            const data = s.val();
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    area.innerHTML += `
                        <div class="post-card">
                            <button class="del-btn" style="display:${isAdmin?'block':'none'}" onclick="remove('${cat}','${key}')">O'chirish</button>
                            ${p.img ? `<img src="${p.img}">` : ''}
                            <div class="post-body">${p.content}</div>
                        </div>`;
                });
            } else { area.innerHTML = "<p style='text-align:center; color:gray;'>Ma'lumot yo'q.</p>"; }
        });
    });
</script>
</body>
</html>
